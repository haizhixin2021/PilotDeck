packages:
  - 'ui'
# 如果你使用的是 pnpm 10.x 或更低版本，保留 onlyBuiltDependencies
# onlyBuiltDependencies:
#   - bcrypt
#   - better-sqlite3
#   ...

# 如果你使用的是 pnpm 11+，请改为使用 allowBuilds（推荐）
allowBuilds:
  bcrypt: true
  better-sqlite3: true
  esbuild: true
  node-pty: true
  protobufjs: true
  sharp: true
  sqlite3: true
  unrs-resolver: true
