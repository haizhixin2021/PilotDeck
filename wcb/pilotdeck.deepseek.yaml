# PilotDeck config — DeepSeek V4 Flash via OpenRouter
# Pricing: $0.14/M input, $0.28/M output

schemaVersion: 1

agent:
  model: openrouter/deepseek/deepseek-v4-flash

model:
  providers:
    openrouter:
      apiKey: ${OPENROUTER_API_KEY}
      models:
        deepseek/deepseek-v4-flash: {}

router:
  stats:
    enabled: true
