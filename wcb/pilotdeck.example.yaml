# PilotDeck configuration — minimal format
# Capabilities, multimodal settings, protocol, and URL are auto-filled
# from the built-in provider catalog. Only specify what's different.

schemaVersion: 1

agent:
  model: deepseek/deepseek-v4-pro

model:
  providers:
    deepseek:
      apiKey: ${DEEPSEEK_API_KEY}
      models:
        deepseek-v4-pro: {}
        deepseek-v4-flash: {}
